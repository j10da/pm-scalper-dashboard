# Railway Deploy Workaround
# Since CLI auth fails, deploy via Railway dashboard:
# 1. Login railway.app
# 2. Select project a411672f-c5fa-4070-92be-be14efc55db2
# 3. New Service → Deploy from GitHub → j10da/pm-scalper-dashboard
# 4. Set root directory: (leave empty, repo root)
# 5. Deploy

name: dashboard
description: PM Scalper Realtime Dashboard
build:
  builder: NIXPACKS
deploy:
  startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
  healthcheckPath: /
  healthcheckTimeout: 100
  restartPolicyType: ON_FAILURE
  restartPolicyMaxRetries: 10
